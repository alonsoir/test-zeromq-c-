name: Argus NDR — CI (Static Validation)

# ============================================================================
# NOTA ARQUITECTURAL — DAY 100
# ============================================================================
# Este workflow ejecuta SOLO validaciones estáticas que no requieren
# la VM Vagrant. El build completo y los tests CTest requieren:
#
#   - libsodium 1.0.19 compilada desde fuente (Debian caps at 1.0.18)
#   - Kernel Linux con eBPF/XDP (CAP_NET_RAW + CAP_NET_ADMIN)
#   - Debian Bookworm con dependencias específicas
#
# Para CI completo se requiere self-hosted runner con la imagen
# "argus-debian-bookworm" — post-arXiv milestone.
#
# TEST-INTEG-1/2/3 (gate arXiv, DAY 99): MANUAL — ejecutar en VM Vagrant:
#   vagrant ssh -c 'cd /vagrant && make test'
#
# Backlog: CI-SMOKE → self-hosted runner (post-arXiv, FASE 3)
# ============================================================================

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

jobs:
  validate-static:
    name: Static Validation (JSON + CMake syntax)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON configs
        run: |
          echo "=== Validating JSON configuration files ==="
          failed=0
          for f in $(find . -name "*.json" \
                      -not -path "./.git/*" \
                      -not -path "*/build/*" \
                      -not -path "*/third_party/*"); do
            python3 -m json.tool "$f" > /dev/null && echo "  ✅ $f" || { echo "  ❌ $f"; failed=1; }
          done
          [ $failed -eq 0 ] || exit 1
          echo "=== All JSON configs valid ==="

      - name: Check CMakeLists.txt files exist
        run: |
          echo "=== Checking CMakeLists.txt presence ==="
          for component in sniffer ml-detector firewall-acl-agent rag-ingester rag etcd-server crypto-transport libs/seed-client; do
            if [ -f "$component/CMakeLists.txt" ]; then
              echo "  ✅ $component/CMakeLists.txt"
            else
              echo "  ❌ MISSING: $component/CMakeLists.txt"
              exit 1
            fi
          done

      - name: Check ADR documentation completeness
        run: |
          echo "=== Checking ADR docs ==="
          expected="ADR-021 ADR-022"
          for adr in $expected; do
            found=$(find docs/adr/ -name "${adr}*" | head -1)
            if [ -n "$found" ]; then
              echo "  ✅ $found"
            else
              echo "  ❌ MISSING: $adr"
              exit 1
            fi
          done

      - name: Verify contexts.hpp symmetric contexts (grep)
        run: |
          echo "=== Verifying contexts.hpp ==="
          f="crypto-transport/include/crypto_transport/contexts.hpp"
          [ -f "$f" ] || { echo "❌ contexts.hpp not found"; exit 1; }
          grep -q "CTX_SNIFFER_TO_ML" "$f"     && echo "  ✅ CTX_SNIFFER_TO_ML present"
          grep -q "CTX_ML_TO_FIREWALL" "$f"    && echo "  ✅ CTX_ML_TO_FIREWALL present"
          grep -q "CTX_ML_TO_RAG" "$f"         && echo "  ✅ CTX_ML_TO_RAG present"
          grep -q "set_terminate" crypto-transport/tests/test_integ_contexts.cpp 2>/dev/null \
            || echo "  ℹ️  set_terminate not in tests (expected in main())"
          echo "  ✅ contexts.hpp structure OK"

      - name: Check set_terminate in all 6 main() files
        run: |
          echo "=== Verifying set_terminate() in all components ==="
          failed=0
          for f in \
            sniffer/src/userspace/main.cpp \
            ml-detector/src/main.cpp \
            firewall-acl-agent/src/main.cpp \
            rag-ingester/src/main.cpp \
            rag/src/main.cpp \
            etcd-server/src/main.cpp; do
            if grep -q "SET_TERMINATE\|set_terminate" "$f"; then
              echo "  ✅ $f"
            else
              echo "  ❌ MISSING set_terminate: $f"
              failed=1
            fi
          done
          [ $failed -eq 0 ] || exit 1

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate-static]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "============================================"
          echo "  Argus NDR — CI Summary"
          echo "  Branch: $GITHUB_REF_NAME"
          echo "  Commit: $GITHUB_SHA"
          echo "============================================"
          echo ""
          echo "  ℹ️  Full build + CTest requires self-hosted runner."
          echo "  ℹ️  Run 'vagrant ssh -c \"cd /vagrant && make test\"'"
          echo "  ℹ️  for the complete 24/24 test suite."
          echo "============================================"